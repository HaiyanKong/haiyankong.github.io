{{ define "main" }}

<a href="/wiki/">Wiki◀</a>

<article>

    <center>
        <h1>{{ .Title }}</h1>
        <!-- <p><time datetime="{{ .Date }}">{{ .Date | time.Format site.Params.theme_config.date_format }}</time></p> -->
    </center>
    
    {{ if .Params.toc }}
        <aside {{ if .Params.tocBorder }} class="toc" {{ end }}>
            {{ .TableOfContents }}
        </aside>
    {{ end }}

    <hr>

    {{ .Content }}

    <hr>

</article>

{{ end }}
