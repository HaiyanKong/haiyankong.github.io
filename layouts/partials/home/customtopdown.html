<article class="{{ if not .Site.Params.homepage.showRecent }} h-full {{ end }} flex flex-col items-center justify-left">
    <header class="flex flex-col mb-1 items-center text-left">
        <!-- Part1 -->
        <!-- photo -->
        {{ with .Site.Author.image }}
            {{ $authorImage := resources.Get . }}
        <!-- {{ if $authorImage }}
                {{ $authorImage := $authorImage.Fill "2315x2315 Center" }}
                <img
                class="mb-2"
                width="200"
                height="200"
                alt="{{ $.Site.Author.name | default "Author" }}"
                src="{{ $authorImage.RelPermalink }}" 
                {{ if $.Site.Params.enableImageLazyLoading | default true }}
                loading="lazy" {{ end }}>
            {{ end }}-->
        {{ if $authorImage }}
            {{ $authorImage := $authorImage.Fill "500x500 Center" }}
            <img
              class="mb-1"
              width="222"
              height="222"
              alt="{{ $.Site.Author.name | default "Author" }}"
              src="{{ $authorImage.RelPermalink }}"
              {{ if $.Site.Params.enableImageLazyLoading | default true }}
                loading="lazy"{{ end }} 
            />
          {{ end }}
        {{ end }}
        
        <!-- name -->
        <!-- <h3 class="mt-1 font-extrabold text-2xl mb-1">
            {{ .Site.Author.headlinename }}
        </h3> -->
        <!-- intro -->
        <!-- <h3 class="mt-1 text-1xl text-neutral-500 dark:text-neutral-400 mb-1">
            {{ .Site.Author.headlineintro }}
        </h3> -->
        <!-- author-links -->
        <div class="mt-1 text-2xl mb-1">
            {{ partialCached "author-links.html" . }}
        </div>
        <!-- mail -->
        <h3 class="mt-1 text-1xl text-neutral-500 dark:text-neutral-400 mb-1">
            {{ .Site.Author.headlinemail }}
        </h3>
        
        <!-- content -->
        <section style="max-width: 90%;" class="mt-1 prose dark:prose-invert mb-1">
            {{ .Content | emojify }}
        </section>

    </header>
</article>
