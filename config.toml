baseURL = "https://haiyankong.github.io/"
languageCode = "en-us"
title = "HaiyanKong"
theme = "hugo-ht"
footnotereturnlinkcontents = "↩"
enableRobotsTXT = true
# enableGitInfo = true

[permalinks]
cn = "/cn/:year/:month/:day/:slug/"
en = "/en/:year/:month/:day/:slug/"
# posts = "/posts/:year/:month/:day/:slug/"

[[menu.en]]
    name = "Home"
    url = "/"
    weight = 1
[[menu.en]]
    name = "CV"
    url = "/en/cv/"
    weight = 2
[[menu.en]]
    name = "Blog"
    url = "/en/blog/"
    weight = 3
[[menu.en]]
    name = "APAD"
    url = "/en/apad/"
    weight = 4
[[menu.en]]
    name = "中文"
    url = "/cn/"
    weight = 5
[[menu.cn]]
    name = "关于"
    url = "/cn/"
    weight = 1
[[menu.cn]]
    name = "日志"
    url = "/cn/blog/"
    weight = 2
[[menu.cn]]
    name = "English"
    url = "/"
    weight = 3

[params]
    description = "Peronal Website of Haiyan Kong"
    homeText = "Haiyan Kong's Peronal Website"
    blogDirName = "blog"
    singleLang = false
    defaultLang = "en"
    MathJaxCDN = "//cdnjs.cloudflare.com/ajax/libs" 
    MathJaxVersion = "2.7.5"
    favicon = "khy.ico"
    GithubEdit = "https://github.com/HaiyanKong/haiyankong.github.io/edit/master/content/"
    copyright = "&copy;"
    copyrightYear = "2022-2023"
    GithubRepo = "https://github.com/HaiyanKong/haiyankong.github.io"
    ContentSource = "https://raw.githubusercontent.com/HaiyanKong/haiyankong.github.io/master/content/" 

[params.logo]
  url = "111khy.png"
  width = 50.0
  height = 50.0
  alt = "Haiyan Kong"

[params.lang]

    [params.lang.author]
      en = "Haiyan Kong"
      cn = "孔海燕"

    [params.lang.madeWith]
      en = "Made with"
      cn = "本站驱动"

    [params.lang.edit]
      en = "Suggest an edit of this page"
      cn = "编辑本页"

    [params.lang.lastupdate]
      en = "Last modified on"
      cn = "最后一次修改于"

    [params.lang.Sitelastupdate]
      en = "Site last updated on"
      cn = "最近一次更新于"

    [params.lang.sourceCode]
      en = "Content in"
      cn = "内容存于"

    [params.lang.subscribe]
      en = "Subscribe"
      cn = "订阅"

    [params.lang.license]
      en = "License"
      cn = "版权"

[markup]
 defaultMarkdownHandler = "goldmark"

  [markup.goldmark]

    [markup.goldmark.extensions]
    definitionList = true
    footnote = true
    linkify = false
    strikethrough = true
    table = true
    taskList = true
    typographer = true

    [markup.goldmark.parser]
    attribute = true
    autoHeadingID = true

    [markup.goldmark.renderer]
    hardWraps = false
    unsafe = true
    xHTML = false
  
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "pygments"
    tabWidth = 4

  [markup.tableOfContents]
  endLevel = 3
  ordered = true
  startLevel = 2

[imaging]
quality = 100