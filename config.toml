baseURL = '/'
languageCode = 'en-us'
DefaultContentLanguage = "en"
title = "Haiyan Kong"
theme = ["hugo-theme-nostyleplease"]

[module]
  [module.hugoVersion]
    extended=true
    min = "0.41.0"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    style = 'rrt'
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6
    ordered = false

[params]
  [params.theme_config]
    appearance = "light"
    date_format = "2006-01-02"
    isListGroupByDate = true
    isFooter = true

    back_home_text = "Back to Home"
    text1 = ""
    link1 = "//"
    text2 = ""
    link2 = "//"
    #text3 = ""
    #link3 = "//"
    #text4 = ""
    #link4 = "//"
    #text5 = ""
    #link5 = "//"
    #back_to_previous_text = "Back"