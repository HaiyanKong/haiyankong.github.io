{{ define "main" }}

{{ partial "back_link.html" .}}

<h1>{{ .Title }}</h1>

<article>

    {{ if .Params.toc }}
        <aside {{ if .Params.tocBorder }} class="toc" {{ end }}>
            {{ .TableOfContents }}
        </aside>
    {{ end }}

    {{ .Content }}
    
</article>

<p><a href=".." class="backlink">Back to Home</a></p>

{{ end }}
